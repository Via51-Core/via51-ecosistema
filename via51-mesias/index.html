<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mesías Guevara | Vía 51</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="max-w-2xl mx-auto p-10">
        <h1 class="text-4xl font-bold mb-4 text-blue-400">Infraestructura Vía 51</h1>
        <p class="mb-8">Auditoría, trazabilidad y gobernanza digital para el Perú.</p>
        
        <form id="registroForm" class="space-y-4">
            <input type="text" id="nombre" placeholder="Nombre completo" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded">
            <input type="text" id="ubigeo" placeholder="Tu Distrito (Ubigeo)" required class="w-full p-3 bg-gray-800 border border-gray-700 rounded">
            <button type="submit" class="w-full bg-blue-600 p-3 rounded font-bold hover:bg-blue-500">Unirse a la Auditoría</button>
        </form>
    </div>
</body>
</html>
