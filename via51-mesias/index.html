<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vía 51 | Mesías Guevara</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f0f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #root { width: 100%; max-width: 450px; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .btn { width: 100%; padding: 15px; background: #7D2181; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1em; font-weight: bold; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; max-width: 350px; text-align: center; border-top: 10px solid #7D2181; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [enviado, setEnviado] = React.useState(false);

            return (
                <div className="card">
                    <h1 style={{color: '#7D2181'}}>Vía 51</h1>
                    <p>Eje Político, Social y Productivo</p>
                    <button className="btn" onClick={() => setEnviado(true)}>
                        Unirse al Camino
                    </button>

                    {enviado && (
                        <div className="modal-overlay" style={{display: 'flex', alignItems: 'center'}}>
                            <div className="modal-content">
                                <h2>¡Yachaywasiman Hamuy!</h2>
                                <p><strong>ES:</strong> Gracias por sumarte. Construimos el Perú con integridad.</p>
                                <a href="https://chat.whatsapp.com/FsuP06moPhJJSgdmt5Vxk7" 
                                   style={{display: 'block', background: '#25D366', color: 'white', padding: '15px', borderRadius: '10px', textDecoration: 'none', fontWeight: 'bold', marginTop: '20px'}}>
                                    WhatsApp Oficial
                                </a>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
